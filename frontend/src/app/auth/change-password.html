<!-- <div class="flex items-center justify-center bg-surface-alt"> -->
<div class="h-full flex items-center justify-center">
  <nz-card
    class="w-full max-w-md shadow-xl border-border rounded-xl"
    [nzTitle]="'AUTH.CHANGE_PASSWORD' | translate"
  >
    <p class="text-sm text-text-muted mb-4">
      {{ 'AUTH.FIRST_LOGIN_NOTICE' | translate }}
    </p>

    <form nz-form (ngSubmit)="submit()" class="space-y-4">
      <nz-form-item>
        <nz-form-label [nzNoColon]="true">{{ 'AUTH.NEW_PASSWORD' | translate }}</nz-form-label>
        <nz-form-control [nzErrorTip]="'AUTH.PASSWORD_REQUIRED' | translate">
          <nz-input-wrapper>
            <span nz-icon nzType="lock" nzInputPrefix></span>
            <input
              type="password"
              nz-input
              [(ngModel)]="newPassword"
              name="newPassword"
              [placeholder]="'AUTH.ENTER_NEW_PASSWORD' | translate"
            />
          </nz-input-wrapper>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label [nzNoColon]="true">{{ 'AUTH.CONFIRM_PASSWORD' | translate }}</nz-form-label>
        <nz-form-control [nzErrorTip]="'AUTH.CONFIRM_PASSWORD_REQUIRED' | translate">
          <nz-input-wrapper>
            <span nz-icon nzType="check" nzInputPrefix></span>
            <input
              type="password"
              nz-input
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              [placeholder]="'AUTH.RETYPE_NEW_PASSWORD' | translate"
            />
          </nz-input-wrapper>
        </nz-form-control>
      </nz-form-item>

      @if (error()) {
        <nz-alert nzType="error" [nzMessage]="error()" class="mb-4" nzShowIcon></nz-alert>
      }

      <button
        nz-button
        nzType="primary"
        class="w-full h-11 text-lg font-semibold rounded-lg bg-accent hover:bg-accent-hover border-none"
        [nzLoading]="loading()"
      >
        {{ 'AUTH.SUBMIT' | translate }}
      </button>
    </form>
  </nz-card>
</div>
