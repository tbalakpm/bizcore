<div class="h-full flex items-center justify-center">
  <nz-card class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-2 mb-6">
      <span nz-icon nzType="user" nzTheme="outline" class="text-3xl text-primary mb-2"></span>
      <h1 class="text-2xl m-0 p-0 font-bold text-text-heading">
        {{ 'LOGIN.TITLE' | translate }}
      </h1>
    </div>

    <form nz-form (ngSubmit)="submit()" class="space-y-4">
      <nz-form-item>
        <nz-form-label nzFor="username">{{ 'LOGIN.USERNAME' | translate }}</nz-form-label>
        <nz-form-control>
          <input
            nz-input
            type="text"
            [(ngModel)]="username"
            name="username"
            id="username"
            autofocus
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="password">{{ 'LOGIN.PASSWORD' | translate }}</nz-form-label>
        <nz-form-control>
          <input nz-input type="password" [(ngModel)]="password" name="password" id="password" />
        </nz-form-control>
      </nz-form-item>

      <div class="pt-2">
        <button nz-button nzBlock nzType="primary" type="submit" [disabled]="loading">
          <span nz-icon [nzType]="loading ? 'loading' : 'login'" nzTheme="outline"></span>
          {{ 'LOGIN.SUBMIT' | translate }}
        </button>
      </div>
      @if (error) {
        <nz-alert nzType="error" [nzMessage]="error" nzShowIcon></nz-alert>
      }
    </form>
  </nz-card>
</div>
