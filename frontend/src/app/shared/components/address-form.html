<div class="border border-border rounded-lg overflow-hidden mb-3">
  <!-- Header / Toggle -->
  <div
    class="flex items-center justify-between px-3 py-2 bg-surface-raised cursor-pointer hover:bg-surface-alt transition"
    (click)="isExpandable ? toggleOpen() : null">
    <h3 class="text-sm font-semibold text-text-heading">{{ title | translate }}</h3>
    @if (isExpandable) {
    <i-lucide name="chevron-down" class="w-4 h-4 text-text-muted transition-transform duration-200" [class.rotate-180]="isOpen"></i-lucide>
    }
  </div>

  <!-- Form Fields -->
  <div class="p-3 grid grid-cols-1 md:grid-cols-2 gap-3" [class.hidden]="isExpandable && !isOpen">
    <div class="md:col-span-2">
      <label class="label-base">{{ 'ADDRESS.LINE1' | translate }}</label>
      <input type="text" [(ngModel)]="address.addressLine1" name="addr1" [disabled]="disabled"
        class="input-base" />
    </div>
    <div class="md:col-span-2">
      <label class="label-base">{{ 'ADDRESS.LINE2' | translate }}</label>
      <input type="text" [(ngModel)]="address.addressLine2" name="addr2" [disabled]="disabled"
        class="input-base" />
    </div>
    <div>
      <label class="label-base">{{ 'ADDRESS.AREA' | translate }}</label>
      <input type="text" [(ngModel)]="address.area" name="area" [disabled]="disabled"
        class="input-base" />
    </div>
    <div>
      <label class="label-base">{{ 'ADDRESS.CITY' | translate }}</label>
      <input type="text" [(ngModel)]="address.city" name="city" [disabled]="disabled"
        class="input-base" />
    </div>
    <div>
      <label class="label-base">{{ 'ADDRESS.STATE' | translate }}</label>
      <input type="text" [(ngModel)]="address.state" name="state" [disabled]="disabled"
        class="input-base" />
    </div>
    <div>
      <label class="label-base">{{ 'ADDRESS.PINCODE' | translate }}</label>
      <input type="text" [(ngModel)]="address.postalCode" name="postalCode" [disabled]="disabled"
        class="input-base" />
    </div>
    <div>
      <label class="label-base">{{ 'ADDRESS.MOBILE' | translate }}</label>
      <input type="text" [(ngModel)]="address.mobile" name="mobile" [disabled]="disabled"
        class="input-base" />
    </div>
    <div>
      <label class="label-base">{{ 'ADDRESS.EMAIL' | translate }}</label>
      <input type="email" [(ngModel)]="address.email" name="email" [disabled]="disabled"
        class="input-base" />
    </div>
  </div>
</div>
